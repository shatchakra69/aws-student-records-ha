# Local development environment: runs the app against a local MySQL so you can
# test the full CRUD flow before deploying to AWS. Mirrors the app <-> RDS
# relationship you get in production.
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: student_records
      MYSQL_USER: app
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpw"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./app
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: app
      DB_PASSWORD: changeme
      DB_NAME: student_records
      RUN_MIGRATIONS: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
