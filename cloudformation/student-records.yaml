AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Highly available student records web app: VPC (3-tier subnets across 2 AZs),
  ALB, EC2 Auto Scaling Group, RDS MySQL, Secrets Manager, CloudWatch alarms.
  Native CloudFormation equivalent of the Terraform stack in ../terraform.

# ---------------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: student-records
    Description: Prefix for resource names.
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  InstanceType:
    Type: String
    Default: t3.micro
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
  DBName:
    Type: String
    Default: student_records
  DBUsername:
    Type: String
    Default: appuser
  AppPort:
    Type: Number
    Default: 3000
  AppRepoUrl:
    Type: String
    Description: Public Git URL the instances clone the app from at boot.
  AppRepoBranch:
    Type: String
    Default: main
  MultiAZ:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  LatestUbuntuAmi:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id

# ---------------------------------------------------------------------------
Resources:

  # --- Network ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-vpc" }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-igw" }]

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 256, 8]]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-public-1" }]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 256, 8]]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-public-2" }]

  AppSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [10, !Cidr [!Ref VpcCidr, 256, 8]]
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-app-1" }]

  AppSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [11, !Cidr [!Ref VpcCidr, 256, 8]]
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-app-2" }]

  DbSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [20, !Cidr [!Ref VpcCidr, 256, 8]]
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-db-1" }]

  DbSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [21, !Cidr [!Ref VpcCidr, 256, 8]]
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-db-2" }]

  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-nat" }]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-public-rt" }]

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet1, RouteTableId: !Ref PublicRouteTable }
  PublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet2, RouteTableId: !Ref PublicRouteTable }

  AppRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-app-rt" }]

  AppRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref AppRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  AppSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref AppSubnet1, RouteTableId: !Ref AppRouteTable }
  AppSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref AppSubnet2, RouteTableId: !Ref AppRouteTable }

  DbRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-db-rt" }]

  DbSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref DbSubnet1, RouteTableId: !Ref DbRouteTable }
  DbSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref DbSubnet2, RouteTableId: !Ref DbRouteTable }

  # --- Security groups ---
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound HTTP from the internet to the ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-alb-sg" }]

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound HTTP from the ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, SourceSecurityGroupId: !Ref AlbSecurityGroup }
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-app-sg" }]

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL from the app tier only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 3306, ToPort: 3306, SourceSecurityGroupId: !Ref AppSecurityGroup }
      Tags: [{ Key: Name, Value: !Sub "${ProjectName}-rds-sg" }]

  # --- Database credentials in Secrets Manager ---
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}-db-credentials"
      Description: MySQL credentials for the student records app
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${DBUsername}"}'
        GenerateStringKey: password
        PasswordLength: 20
        ExcludePunctuation: true

  # --- RDS ---
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private DB subnets
      SubnetIds: [!Ref DbSubnet1, !Ref DbSubnet2]

  DB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-db"
      Engine: mysql
      EngineVersion: "8.0.43"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: "20"
      StorageType: gp3
      StorageEncrypted: true
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DBSecret}:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: [!Ref RdsSecurityGroup]
      PubliclyAccessible: false
      MultiAZ: !Ref MultiAZ

  DBSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref DB
      TargetType: AWS::RDS::DBInstance

  # --- IAM for the app instances ---
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: read-db-secret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DBSecret

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref AppRole]

  # --- Load balancer ---
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-alb"
      Scheme: internet-facing
      Type: application
      SecurityGroups: [!Ref AlbSecurityGroup]
      Subnets: [!Ref PublicSubnet1, !Ref PublicSubnet2]

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-tg"
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: { HttpCode: "200" }

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # --- Compute (Launch Template + ASG) ---
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${ProjectName}-lt"
      LaunchTemplateData:
        ImageId: !Ref LatestUbuntuAmi
        InstanceType: !Ref InstanceType
        IamInstanceProfile: { Arn: !GetAtt AppInstanceProfile.Arn }
        SecurityGroupIds: [!Ref AppSecurityGroup]
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
        UserData:
          Fn::Base64:
            Fn::Sub:
              - |
                #!/bin/bash
                set -euo pipefail
                export DEBIAN_FRONTEND=noninteractive
                apt-get update -y
                apt-get install -y nginx jq unzip curl git
                curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
                unzip -q /tmp/awscliv2.zip -d /tmp
                /tmp/aws/install
                curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
                apt-get install -y nodejs
                APP_DIR=/opt/student-records
                git clone --branch ${AppRepoBranch} ${AppRepoUrl} "$APP_DIR"
                cd "$APP_DIR/app"
                npm ci --omit=dev
                SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id ${SecretArn} --region ${AWS::Region} --query SecretString --output text)
                DB_USER=$(echo "$SECRET_JSON" | jq -r .username)
                DB_PASSWORD=$(echo "$SECRET_JSON" | jq -r .password)
                umask 077
                cat >/etc/student-records.env <<ENVEOF
                PORT=${AppPort}
                NODE_ENV=production
                DB_HOST=${DbHost}
                DB_PORT=${DbPort}
                DB_NAME=${DBName}
                DB_USER=$DB_USER
                DB_PASSWORD=$DB_PASSWORD
                RUN_MIGRATIONS=true
                ENVEOF
                cat >/etc/systemd/system/student-records.service <<'SVCEOF'
                [Unit]
                Description=Student Records App
                After=network.target
                [Service]
                Type=simple
                WorkingDirectory=/opt/student-records/app
                EnvironmentFile=/etc/student-records.env
                ExecStart=/usr/bin/node server.js
                Restart=always
                User=www-data
                [Install]
                WantedBy=multi-user.target
                SVCEOF
                systemctl daemon-reload
                systemctl enable --now student-records
                cat >/etc/nginx/sites-available/student-records <<'NGINXEOF'
                server {
                    listen 80 default_server;
                    location / {
                        proxy_pass http://127.0.0.1:${AppPort};
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto $scheme;
                    }
                }
                NGINXEOF
                ln -sf /etc/nginx/sites-available/student-records /etc/nginx/sites-enabled/student-records
                rm -f /etc/nginx/sites-enabled/default
                systemctl restart nginx
              - SecretArn: !Ref DBSecret
                DbHost: !GetAtt DB.Endpoint.Address
                DbPort: !GetAtt DB.Endpoint.Port

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: [AppRoute, DBSecretAttachment]
    Properties:
      VPCZoneIdentifier: [!Ref AppSubnet1, !Ref AppSubnet2]
      MinSize: "2"
      DesiredCapacity: "2"
      MaxSize: "3"
      TargetGroupARNs: [!Ref TargetGroup]
      HealthCheckType: ELB
      HealthCheckGracePeriod: 600
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub "${ProjectName}-app", PropagateAtLaunch: true }

  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 50.0

  # --- CloudWatch alarms ---
  HighCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-high-cpu"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 2
      Period: 120
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Statistic: Average
      Threshold: 70
      Dimensions:
        - { Name: AutoScalingGroupName, Value: !Ref AutoScalingGroup }

  UnhealthyHostsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-unhealthy-hosts"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 2
      Period: 60
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Statistic: Maximum
      Threshold: 0
      Dimensions:
        - { Name: TargetGroup, Value: !GetAtt TargetGroup.TargetGroupFullName }
        - { Name: LoadBalancer, Value: !GetAtt ALB.LoadBalancerFullName }

# ---------------------------------------------------------------------------
Outputs:
  ApplicationURL:
    Description: Open this once instances are healthy.
    Value: !Sub "http://${ALB.DNSName}"
  AlbDnsName:
    Value: !GetAtt ALB.DNSName
  VpcId:
    Value: !Ref VPC
  RdsEndpoint:
    Value: !GetAtt DB.Endpoint.Address
  DbSecretArn:
    Value: !Ref DBSecret
