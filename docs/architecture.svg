<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="960" height="660" fill="#ffffff"/>

  <!-- Users -->
  <rect x="400" y="14" width="160" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="480" y="39" text-anchor="middle" font-size="14" fill="#3730a3">Internet Users</text>
  <line x1="480" y1="54" x2="480" y2="94" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Internet Gateway -->
  <rect x="408" y="96" width="144" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="480" y="118" text-anchor="middle" font-size="12.5" fill="#1e40af">Internet Gateway</text>
  <line x1="480" y1="130" x2="480" y2="236" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- VPC -->
  <rect x="30" y="150" width="900" height="488" rx="12" fill="#f8fafc" stroke="#0284c7" stroke-width="2"/>
  <text x="46" y="172" font-size="14" font-weight="bold" fill="#0369a1">VPC · 10.0.0.0/16</text>

  <!-- Availability Zone columns -->
  <rect x="50" y="186" width="420" height="436" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="64" y="204" font-size="12" fill="#64748b">Availability Zone 1</text>
  <rect x="490" y="186" width="420" height="436" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="504" y="204" font-size="12" fill="#64748b">Availability Zone 2</text>

  <!-- Public subnets -->
  <rect x="66" y="222" width="388" height="72" rx="6" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="76" y="240" font-size="11" fill="#0e7490">Public subnet</text>
  <rect x="506" y="222" width="388" height="72" rx="6" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="516" y="240" font-size="11" fill="#0e7490">Public subnet</text>

  <!-- ALB spanning both AZs -->
  <rect x="250" y="248" width="420" height="40" rx="6" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="460" y="273" text-anchor="middle" font-size="13.5" fill="#9a3412">Application Load Balancer</text>

  <!-- NAT Gateway -->
  <rect x="760" y="250" width="124" height="30" rx="6" fill="#fff7ed" stroke="#fb923c"/>
  <text x="822" y="270" text-anchor="middle" font-size="11" fill="#9a3412">NAT Gateway</text>

  <!-- App tier label -->
  <text x="480" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">Auto Scaling Group · min 2 / desired 2 / max 3</text>

  <!-- Private app subnets -->
  <rect x="66" y="326" width="388" height="78" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="76" y="344" font-size="11" fill="#15803d">Private app subnet</text>
  <rect x="506" y="326" width="388" height="78" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="516" y="344" font-size="11" fill="#15803d">Private app subnet</text>

  <rect x="150" y="352" width="220" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="260" y="379" text-anchor="middle" font-size="12" fill="#854d0e">EC2 · Node.js + NGINX</text>
  <rect x="590" y="352" width="220" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="700" y="379" text-anchor="middle" font-size="12" fill="#854d0e">EC2 · Node.js + NGINX</text>

  <!-- Private DB subnets -->
  <rect x="66" y="436" width="388" height="78" rx="6" fill="#faf5ff" stroke="#a855f7"/>
  <text x="76" y="454" font-size="11" fill="#7e22ce">Private DB subnet</text>
  <rect x="506" y="436" width="388" height="78" rx="6" fill="#faf5ff" stroke="#a855f7"/>
  <text x="516" y="454" font-size="11" fill="#7e22ce">Private DB subnet</text>

  <rect x="150" y="462" width="220" height="44" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="260" y="489" text-anchor="middle" font-size="11.5" fill="#5b21b6">Amazon RDS MySQL (primary)</text>
  <rect x="590" y="462" width="220" height="44" rx="6" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="700" y="489" text-anchor="middle" font-size="10.5" fill="#7c3aed">RDS standby (Multi-AZ option)</text>

  <!-- Traffic arrows -->
  <line x1="380" y1="288" x2="262" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="560" y1="288" x2="700" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="260" y1="396" x2="260" y2="460" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <line x1="700" y1="396" x2="372" y2="476" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Replication (primary -> standby) -->
  <line x1="370" y1="484" x2="588" y2="484" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#a)"/>

  <!-- Outbound via NAT (dashed) -->
  <line x1="760" y1="358" x2="800" y2="282" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <line x1="822" y1="250" x2="822" y2="150" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#a)"/>

  <!-- Legend -->
  <text x="46" y="556" font-size="11.5" fill="#475569" font-weight="bold">Security groups (least privilege):</text>
  <text x="46" y="576" font-size="11.5" fill="#475569">internet → ALB :80   ·   ALB → app :80   ·   app → RDS :3306</text>
  <text x="46" y="600" font-size="11.5" fill="#475569" font-weight="bold">Access:</text>
  <text x="120" y="600" font-size="11.5" fill="#475569">SSM Session Manager (no SSH) · DB credentials in Secrets Manager</text>
</svg>
