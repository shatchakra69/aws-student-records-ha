<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 960" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#334155"/>
    </marker>
    <marker id="arrd" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1240" height="960" fill="#ffffff"/>

  <!-- Users -->
  <rect x="400" y="18" width="160" height="40" rx="8" fill="#e2e8f0" stroke="#475569"/>
  <text x="480" y="43" text-anchor="middle" font-size="13" fill="#0f172a">Internet Users</text>

  <!-- AWS Cloud -->
  <rect x="24" y="72" width="1192" height="876" rx="12" fill="#fbfdff" stroke="#94a3b8"/>
  <text x="46" y="98" font-size="14" font-weight="bold" fill="#334155">AWS Cloud</text>
  <text x="46" y="116" font-size="11" fill="#64748b">Region: us-east-1</text>

  <!-- Internet Gateway -->
  <rect x="400" y="96" width="160" height="40" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="480" y="121" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1e40af">Internet Gateway</text>

  <!-- VPC -->
  <rect x="56" y="158" width="820" height="682" rx="10" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/>
  <text x="74" y="182" font-size="13.5" font-weight="bold" fill="#1e40af">VPC&#160;&#160;10.0.0.0/16</text>

  <!-- Availability Zone columns -->
  <rect x="84" y="206" width="384" height="616" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="98" y="227" font-size="11.5" fill="#64748b">Availability Zone&#160;&#160;us-east-1a</text>
  <rect x="492" y="206" width="384" height="616" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="506" y="227" font-size="11.5" fill="#64748b">Availability Zone&#160;&#160;us-east-1b</text>

  <!-- Public subnets -->
  <rect x="104" y="248" width="344" height="150" rx="6" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="116" y="268" font-size="11.5" font-weight="bold" fill="#0e7490">Public subnet</text>
  <text x="116" y="284" font-size="10.5" fill="#0e7490" font-style="italic">10.0.0.0/24</text>
  <rect x="512" y="248" width="344" height="150" rx="6" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="524" y="268" font-size="11.5" font-weight="bold" fill="#0e7490">Public subnet</text>
  <text x="524" y="284" font-size="10.5" fill="#0e7490" font-style="italic">10.0.1.0/24</text>

  <!-- NAT Gateway (in AZ-a public) -->
  <rect x="120" y="300" width="150" height="42" rx="6" fill="#fff7ed" stroke="#fb923c"/>
  <text x="195" y="318" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#9a3412">NAT Gateway</text>
  <text x="195" y="333" text-anchor="middle" font-size="9.5" fill="#9a3412">outbound to internet</text>

  <!-- Application Load Balancer (spans both public subnets) -->
  <rect x="165" y="352" width="630" height="44" rx="6" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="480" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">Application Load Balancer</text>
  <text x="480" y="386" text-anchor="middle" font-size="10.5" fill="#9a3412">internet-facing&#160;&#183;&#160;HTTP listener :80&#160;&#183;&#160;health check /health</text>

  <!-- Private app subnets -->
  <rect x="104" y="452" width="344" height="150" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="116" y="472" font-size="11.5" font-weight="bold" fill="#15803d">Private app subnet</text>
  <text x="116" y="488" font-size="10.5" fill="#15803d" font-style="italic">10.0.10.0/24</text>
  <rect x="512" y="452" width="344" height="150" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="524" y="472" font-size="11.5" font-weight="bold" fill="#15803d">Private app subnet</text>
  <text x="524" y="488" font-size="10.5" fill="#15803d" font-style="italic">10.0.11.0/24</text>

  <!-- EC2 instances -->
  <rect x="150" y="505" width="250" height="86" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="275" y="527" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">EC2&#160;&#183;&#160;t3.micro</text>
  <text x="275" y="544" text-anchor="middle" font-size="10.5" fill="#854d0e">Node.js + NGINX</text>
  <text x="275" y="561" text-anchor="middle" font-size="10" fill="#854d0e" font-style="italic">Auto Scaling Group</text>
  <text x="275" y="578" text-anchor="middle" font-size="10" fill="#854d0e">min 2&#160;/&#160;desired 2&#160;/&#160;max 3</text>
  <rect x="560" y="505" width="250" height="86" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="685" y="527" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">EC2&#160;&#183;&#160;t3.micro</text>
  <text x="685" y="544" text-anchor="middle" font-size="10.5" fill="#854d0e">Node.js + NGINX</text>
  <text x="685" y="561" text-anchor="middle" font-size="10" fill="#854d0e" font-style="italic">Auto Scaling Group</text>
  <text x="685" y="578" text-anchor="middle" font-size="10" fill="#854d0e">min 2&#160;/&#160;desired 2&#160;/&#160;max 3</text>

  <!-- Private DB subnets -->
  <rect x="104" y="655" width="344" height="150" rx="6" fill="#faf5ff" stroke="#a855f7"/>
  <text x="116" y="675" font-size="11.5" font-weight="bold" fill="#7e22ce">Private DB subnet</text>
  <text x="116" y="691" font-size="10.5" fill="#7e22ce" font-style="italic">10.0.20.0/24</text>
  <rect x="512" y="655" width="344" height="150" rx="6" fill="#faf5ff" stroke="#a855f7"/>
  <text x="524" y="675" font-size="11.5" font-weight="bold" fill="#7e22ce">Private DB subnet</text>
  <text x="524" y="691" font-size="10.5" fill="#7e22ce" font-style="italic">10.0.21.0/24</text>

  <!-- RDS primary -->
  <rect x="150" y="705" width="270" height="84" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="285" y="727" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#5b21b6">Amazon RDS&#160;&#183;&#160;MySQL 8.0</text>
  <text x="285" y="744" text-anchor="middle" font-size="10.5" fill="#5b21b6">db.t3.micro&#160;&#183;&#160;primary</text>
  <text x="285" y="761" text-anchor="middle" font-size="10" fill="#5b21b6" font-style="italic">private&#160;&#183;&#160;no public access&#160;&#183;&#160;encrypted</text>
  <!-- RDS standby (optional) -->
  <rect x="560" y="705" width="270" height="84" rx="6" fill="none" stroke="#a855f7" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="695" y="740" text-anchor="middle" font-size="11" fill="#7c3aed">RDS standby</text>
  <text x="695" y="758" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">Multi-AZ option (db_multi_az)</text>

  <!-- ============ Supporting services (right) ============ -->
  <rect x="908" y="470" width="288" height="56" rx="6" fill="#e0f2fe" stroke="#0891b2"/>
  <text x="1052" y="493" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#155e75">AWS Secrets Manager</text>
  <text x="1052" y="511" text-anchor="middle" font-size="10" fill="#155e75" font-style="italic">generated DB password</text>

  <rect x="908" y="545" width="288" height="56" rx="6" fill="#f1f5f9" stroke="#64748b"/>
  <text x="1052" y="568" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#334155">EC2 IAM Role</text>
  <text x="1052" y="586" text-anchor="middle" font-size="10" fill="#334155" font-style="italic">SSM access + read one secret</text>

  <rect x="908" y="620" width="288" height="56" rx="6" fill="#fce7f3" stroke="#db2777"/>
  <text x="1052" y="643" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#9d174d">Amazon CloudWatch</text>
  <text x="1052" y="661" text-anchor="middle" font-size="10" fill="#9d174d" font-style="italic">CPU + target-health alarms</text>

  <!-- ============ ARROWS (request path, solid) ============ -->
  <!-- Users -> IGW -->
  <line x1="480" y1="58" x2="480" y2="94" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <!-- IGW -> ALB (central gutter) -->
  <line x1="480" y1="136" x2="480" y2="350" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="490" y="250" font-size="10.5" fill="#334155">HTTP</text>
  <!-- ALB -> EC2 a / b -->
  <line x1="275" y1="396" x2="275" y2="503" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="284" y="450" font-size="10.5" fill="#334155">:80</text>
  <line x1="685" y1="396" x2="685" y2="503" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="694" y="450" font-size="10.5" fill="#334155">:80</text>
  <!-- EC2 a -> RDS (straight down) -->
  <line x1="285" y1="591" x2="285" y2="703" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="294" y="650" font-size="10.5" fill="#334155">:3306</text>
  <!-- EC2 b -> RDS (orthogonal, in the gutter) -->
  <polyline points="685,591 685,632 352,632 352,703" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="520" y="626" font-size="10.5" fill="#334155">:3306</text>

  <!-- ============ ARROWS (outbound + supporting, dashed) ============ -->
  <!-- EC2 a -> NAT (outbound) -->
  <line x1="180" y1="505" x2="180" y2="344" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>
  <text x="192" y="430" font-size="9.5" fill="#64748b">outbound HTTPS</text>
  <!-- App tier integrates with managed services via its IAM role -->
  <polyline points="810,524 868,524 868,498 906,498" fill="none" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>
  <polyline points="810,560 886,560 886,573 906,573" fill="none" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>
  <polyline points="810,588 896,588 896,648 906,648" fill="none" stroke="#64748b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrd)"/>
  <text x="822" y="466" font-size="9.5" fill="#64748b" font-style="italic">app tier uses these via its IAM role</text>

  <!-- ============ Legend / security ============ -->
  <rect x="56" y="858" width="1140" height="78" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="74" y="882" font-size="12" font-weight="bold" fill="#334155">Security &amp; access</text>
  <text x="74" y="902" font-size="11" fill="#475569">Security groups (least privilege):&#160;&#160;internet &#8594; ALB :80&#160;&#160;&#183;&#160;&#160;ALB &#8594; app :80&#160;&#160;&#183;&#160;&#160;app &#8594; RDS :3306</text>
  <text x="74" y="921" font-size="11" fill="#475569">SSM Session Manager (no SSH port)&#160;&#160;&#183;&#160;&#160;IMDSv2 enforced&#160;&#160;&#183;&#160;&#160;DB password in Secrets Manager&#160;&#160;&#183;&#160;&#160;RDS storage encrypted</text>

  <!-- colour key -->
  <rect x="800" y="872" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/><text x="820" y="883" font-size="10" fill="#475569">Network</text>
  <rect x="800" y="892" width="14" height="14" rx="3" fill="#fef9c3" stroke="#ca8a04"/><text x="820" y="903" font-size="10" fill="#475569">Compute</text>
  <rect x="800" y="912" width="14" height="14" rx="3" fill="#ede9fe" stroke="#7c3aed"/><text x="820" y="923" font-size="10" fill="#475569">Database</text>
  <rect x="980" y="872" width="14" height="14" rx="3" fill="#ecfeff" stroke="#06b6d4"/><text x="1000" y="883" font-size="10" fill="#475569">Public subnet</text>
  <rect x="980" y="892" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#22c55e"/><text x="1000" y="903" font-size="10" fill="#475569">Private app subnet</text>
  <rect x="980" y="912" width="14" height="14" rx="3" fill="#faf5ff" stroke="#a855f7"/><text x="1000" y="923" font-size="10" fill="#475569">Private DB subnet</text>
</svg>
